<th:block
  xmlns:th="https://www.thymeleaf.org"
  th:with="
     assets_link = ${theme.config.loading.source instanceof T(java.util.Map) and theme.config.loading.source.type != null ? theme.config.loading.source[theme.config.loading.source.type] : '/themes/theme-butterfly/assets/'},
     param_prefix = ${theme.config.loading.img != null and #strings.containsIgnoreCase(theme.config.loading.img.random_link,'?') ? '&' : '?'}
  "
  th:fragment="layout (page,title,pin,header,main)"
>
  <!DOCTYPE html>
  <html lang="en" data-color-scheme="light" th:with="isDev = ${true ? #dates.createNow().time : ''} ">
  <head>
    <title th:text="${title}"></title>
    <link rel="preload" th:href="@{/assets/font/CircularBody/CircularBody.woff}" as="font" type="font/woff" crossorigin="anonymous" />
    <link rel="preload" th:href="@{/assets/font/CircularBody.min.css}" as="style" />
    <link rel="preload" th:href="@{/assets/plugins/fontawesome/fontawesome.min.css}" as="style" />
    <link rel="stylesheet" th:href="@{/assets/font/CircularBody.min.css}" media="all" />
    <link rel="stylesheet" th:href="@{/assets/plugins/fontawesome/fontawesome.min.css}" media="all" />
    <link rel="stylesheet" th:href="|${assets_link}css/index.min.css?v=${theme.spec.version}|" media="all">
    <noscript><link rel="stylesheet" th:href="|${assets_link}css/index.min.css?v=${theme.spec.version}|"></noscript>
    <meta charset="UTF-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no, viewport-fit=cover">
    <meta name="author" th:content="${site.title}">
    <meta name="site" th:content="${site.url}">
    <meta name="description" th:content="${site.subtitle}"/>
    <meta property="og:keywords" th:content="${site.seo.keywords}">
    <meta property="og:description" th:content="${site.subtitle}">
    <meta property="og:site_name" th:content="${site.title}">
    <meta property="og:url" th:content="${site.url}">
    <meta property="og:title" th:content="${site.title}">
    <meta property="og:locale" content="zh_CN">
    <meta property="og:type" th:content="${page}" th:value="${page}">
    <link rel="canonical" th:href="${site.url}">
    <th:block th:replace="~{views/config}"/>
    <th:block th:replace="${pin}"/>
    <link rel="preload stylesheet" as="style" th:href="${assets_link + 'css/' + (page ?: 'index') + '.min.css?v=' + theme.spec.version}">
  </head>

  <body th:classappend="${theme.config.loading.type != 'null' ? 'loading' : ''}" th:with="stats = ${siteStatsFinder.getStats()},contributor = ${contributorFinder.getContributor(theme.config.base.metadata_name)}">
  <script defer type="text/javascript" th:if="${theme.config.loading.type != 'null'}" th:src="${assets_link + 'plugins/loading/' + theme.config.loading.type + '.min.js?v=' + theme.spec.version}"></script>

  <div id="Butterfly" th:class="${page}">
    <th:block th:replace="${header}"></th:block>

    <main class="main" th:classappend="${theme.config.aside.enable ? theme.config.aside.position : '' }" th:insert="${main}"></main>

    <th:block th:replace="~{views/footer}"/>

    <th:block th:replace="~{views/components::side}"/>
  </div>

  <script defer type="text/javascript" th:src="${assets_link + 'js/' + (page ?: 'index') + '.min.js?v=' + theme.spec.version }"></script>
  </body>
  </html>
</th:block>
